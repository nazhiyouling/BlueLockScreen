name: Build Windows App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [created]  # 当创建 Release 时触发

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish
      run: dotnet publish BlueLockScreen.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      if: github.event_name == 'release'
      with:
        files: publish/BlueLockScreen.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Artifact (for branch pushes)
      uses: actions/upload-artifact@v4
      if: github.event_name != 'release'
      with:
        name: BlueLockScreen-win-x64
        path: publish/BlueLockScreen.exe
