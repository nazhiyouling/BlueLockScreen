name: Build Windows App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Publish
      run: dotnet publish BlueLockScreen.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: BlueLockScreen-win-x64
        path: publish/BlueLockScreen.exe
